server.port: 9998

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    reactor.netty.http.client: DEBUG

spring:
  application:
    name: gateway-admin
  data:
    redis:
      host: algashop-redis
      port: 6379
      password: algashop
      database: 3
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.algashop.local:8081
  cloud:
    gateway:
      server:
        webflux:
          route-refresh-listener:
            enabled: false
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET,PUT
                exceptions: java.io.IOException, java.util.concurrent.TimeoutException
                backoff:
                  firstBackoff: 10ms
                  maxBackoff: 20ms
          httpclient:
            connect-timeout: 1000
            response-timeout: 5000
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                  allowedOrigins: http://admin.algashop.local:4200
                  allowedHeaders: '*'
                  allowedMethods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - OPTIONS
          routes:
            - id: orders-route
              uri: lb://ordering
              predicates:
                - Path=/api/v1/orders/**
                - Method=GET,POST,PUT,DELETE,OPTIONS
              filters:
                - name: CircuitBreaker
                  args:
                    name: ordering-route-cb
                    statusCodes:
                      - 502
                      - 504
                      - 500
            - id: customers-route
              uri: lb://ordering
              predicates:
                - Path=/api/v1/customers/**
                - Method=GET,OPTIONS
            - id: product-catalog-route
              uri: lb://product-catalog
              predicates:
                - Path=/api/v1/products/{productId}/**,/api/v1/categories/**,/api/v1/upload-requests/**
                - Method=GET,POST,PUT,DELETE,OPTIONS
              filters:
#                - LocalResponseCache=5m,30MB
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter:
                      replenishRate: 50
                      burstCapacity: 200
                      requestedTokens: 1
                    key-resolver: "#{@rateLimitKeyResolver}"
            - id: product-catalog-list-route
              uri: lb://product-catalog
              predicates:
                - Path=/api/v1/products
                - Method=GET
              filters:
                - RemoveJsonAttributesResponseBody=shortDescription,mainImage,true
            - id: user-management-route
              uri: lb://authorization-server
              predicates:
                - Path=/api/v1/users/**
                - Method=GET,POST,PUT,DELETE,OPTIONS

eureka:
  client:
    serviceUrl:
      defaultZone: http://algashop-service-registry:8761/eureka
    registerWithEureka: false
    fetchRegistry: true

management:
  endpoints:
    web:
      exposure:
        include: health, gateway, circuitbreakers
  endpoint:
    gateway:
      enabled: true


resilience4j.circuitbreaker:
  instances:
    ordering-route-cb:
      slidingWindowSize: 8
      failureRateThreshold: 50
      minimumNumberOfCalls: 5
      permittedNumberOfCallsInHalfOpenState: 5
      slidingWindowType: COUNT_BASED
      waitDurationInOpenState: 10s
      maxWaitDurationInHalfOpenState: 30s
      registerHealthIndicator: true
